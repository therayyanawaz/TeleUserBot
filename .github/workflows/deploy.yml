name: Deploy on push

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths:
      - "**/*.py"
      - "requirements*.txt"
      - "pytest.ini"
      - ".github/workflows/*.yml"
      - "install-all.ps1"
      - "install-all-ubuntu.sh"

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Force Node 24 for actions
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=${FORCE_JAVASCRIPT_ACTIONS_TO_NODE24}"

      - name: Lint
        env:
          DB_PATH: /tmp/test_teleuserbot.db
        run: >
          python -m ruff check .
          --select E,F,W
          --ignore E501
          --exclude main.py,ai_filter.py,utils.py,breaking_story.py,severity_classifier.py,tests/test_ai_filter_decisions.py

      - name: Run tests
        env:
          DB_PATH: /tmp/test_teleuserbot.db
        run: python -m pytest tests/ -q

      - name: Trigger deploy webhook
        if: success() && env.DEPLOY_WEBHOOK_URL != ''
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          curl -s --fail --max-time 10 -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Authorization: Bearer $DEPLOY_WEBHOOK_SECRET" \
            -H "Content-Type: application/json" \
            -d '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'
