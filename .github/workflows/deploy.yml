name: Deploy on push

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Force Node 24 for actions
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=${FORCE_JAVASCRIPT_ACTIONS_TO_NODE24}"

      - name: Run filter tests
        env:
          DB_PATH: /tmp/test_teleuserbot.db
        run: python -m pytest tests/test_ai_filter_decisions.py -q

      - name: Run scheduler tests
        env:
          DB_PATH: /tmp/test_teleuserbot.db
        run: python -m pytest tests/test_digest_scheduler.py -q

      - name: Run rail order integration tests
        env:
          DB_PATH: /tmp/test_teleuserbot.db
        run: python -m pytest tests/test_rail_order_integration.py -q

      - name: Trigger deploy webhook
        if: success() && env.DEPLOY_WEBHOOK_URL != ''
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          curl -s -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Authorization: Bearer $DEPLOY_WEBHOOK_SECRET" \
            -H "Content-Type: application/json" \
            -d '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'
